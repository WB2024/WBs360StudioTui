name: Build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases and upload assets

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: x360tm
          - os: windows-latest
            artifact: x360tm.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build
        run: pyinstaller x360tm.spec --noconfirm

      - name: Bundle Linux release (tar.gz)
        if: runner.os == 'Linux'
        run: |
          mkdir -p release_bundle/Icons
          cp dist/x360tm release_bundle/x360tm
          cp install.sh release_bundle/install.sh
          cp x360tm.desktop release_bundle/x360tm.desktop
          cp Icons/Icon256.ico release_bundle/Icons/Icon256.ico
          chmod +x release_bundle/x360tm release_bundle/install.sh
          tar -czf dist/x360tm-linux.tar.gz -C release_bundle .

      - name: Upload Linux release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Linux'
        with:
          files: |
            dist/x360tm-linux.tar.gz
            dist/x360tm

      - name: Bundle Windows release (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release_bundle\Icons | Out-Null
          Copy-Item dist\x360tm.exe release_bundle\x360tm.exe
          Copy-Item install.ps1 release_bundle\install.ps1
          Copy-Item Icons\Icon256.ico release_bundle\Icons\Icon256.ico
          Compress-Archive -Path release_bundle\* -DestinationPath dist\x360tm-windows.zip

      - name: Upload Windows release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        with:
          files: |
            dist/x360tm-windows.zip
            dist/x360tm.exe
